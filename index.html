<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Tribute</title>
    <style>
        body {
            background-color: #805538;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f4f4f4;
        }

        .sunset-card {
            max-width: 500px;
            background: #2a2a2a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .sunset-card:hover {
            transform: translateY(-5px);
        }

        .sunset-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            padding: 30px;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ff8c42; /* Sunset Orange */
        }

        .quote {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 15px;
            color: #ccc;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: #ff8c42;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="sunset-card">
        <img src="sunset.jpg" alt="Sunset over water" class="sunset-image">
        
        <div class="content">
            <h1>Sunset</h1>
            <div class="divider"></div>
            <p class="quote">
                "Sunsets are proof that no matter what happens, every day can end beautifully."
            </p>
        </div>
    </div>

</body>
</html>
